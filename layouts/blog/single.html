{{ define "main" }}

<section class="site-blog details">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <article class="site-blog-details">
          <p><span>{{ .PublishDate.Format .Site.Params.dateFormat }}</span> <br> <span>{{ .Params.author }}</span></p>
          <h2 class="blog-title">{{ .Title }}</h2>
          <img class="feature-image" src="{{ .Params.feature_image | absURL }}" alt="{{ .Title }}">
            <div class="black">
            {{ .Content }}
            </div>

          
        </article>
      </div>
    </div>
  </div>
</section>
<div class="spacecontact"></div>

{{ end }}
