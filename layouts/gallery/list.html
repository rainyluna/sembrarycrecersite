{{ define "main" }}

<section class="site-gallery-header">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        <h1>{{ .Title }}</h1>
        <p>
          {{ .Params.description }}
        </p>
      </div>
    </div>
  </div>
</section>

<section class="site-gallery">
  <div class="container">
    <div class="gallery-filters">
        <button class="filter-btn active" data-filter="all">{{ i18n "filter_all" }}</button>
        <button class="filter-btn" data-filter="escuela-empoderarte">{{ i18n "filter_empoderarte" }}</button>
        <button class="filter-btn" data-filter="entrega-donaciones">{{ i18n "filter_donations" }}</button>
        <button class="filter-btn" data-filter="eventos">{{ i18n "filter_events" }}</button>
        <button class="filter-btn" data-filter="apoyo-a-peluditos">{{ i18n "filter_pets" }}</button>
    </div>

    <div class="gallery-grid">
      {{ range .Pages }}
      <div class="gallery-item" data-category="{{ .Params.category | default "eventos" | urlize }}">
          {{ with .Params.image }}
          <div class="gallery-item-image">
            <img src="{{ . | absURL }}" alt="{{ $.Title }}">
          </div>
          {{ end }}
      </div>
      {{ end }}
    </div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterBtns = document.querySelectorAll('.filter-btn');
    const galleryItems = document.querySelectorAll('.gallery-item');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Remove active class from all buttons
            filterBtns.forEach(b => b.classList.remove('active'));
            // Add active class to clicked button
            btn.classList.add('active');

            const filterValue = btn.getAttribute('data-filter');

            galleryItems.forEach(item => {
                if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                    item.style.display = 'block';
                    // Optional: Add animation class here
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });
});
</script>

{{ end }}
